name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  statuses: write

env:
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main

jobs:
  python:
    name: python / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install pytest
      - run: python -m ai_ops check
      - name: pytest -m slow (integration / pip install)
        run: python -m pytest -m slow

  nix:
    name: nix / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: macos-latest
            system: aarch64-darwin
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false
      - name: drop Determinate-only upstream Nix setting
        shell: bash
        run: |
          for dir in /etc/nix /nix/var/nix/profiles/default/etc/nix "$HOME/.config/nix" /root/.config/nix; do
            if [[ -d "$dir" ]]; then
              sudo find "$dir" -name "*.conf" -type f -exec perl -0pi -e 's/^\s*build-provenance-tags\b.*\n//mg' {} +
            fi
          done
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            sudo launchctl kickstart -k system/org.nixos.nix-daemon
          else
            sudo systemctl restart nix-daemon.service
          fi
      - name: nix flake check (schema / cross-system eval)
        run: nix flake check --all-systems --no-build
      - name: nix build checks / current runner
        run: nix build --no-link ".#checks.${{ matrix.system }}.all"

  # ai-ops 自身を ai-ops review-pr で dogfood する (PR α 以降)。
  # ai-ops は Tier A (trunk-based) 想定なので、結果は Comment + status check
  # として表示するが、status check の失敗で merge を止めない (continue-on-error)。
  # ANTHROPIC_API_KEY または OPENAI_API_KEY が secrets に登録されていない場合は
  # neutral を返して exit 0 (CI を壊さない、設計通り)。
  review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e .
      - name: ai-ops review-pr (self-dogfood)
        env:
          GH_TOKEN: ${{ github.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -m ai_ops review-pr \
            --pr ${{ github.event.pull_request.number }} \
            --provider auto
