# Fallback for projects where Renovate cannot run (T3 local / non-GitHub host).
# Place this file at .github/workflows/update-flake-lock.yml in the target project.
# Reference: https://github.com/DeterminateSystems/update-flake-lock

name: update-flake-lock

on:
  workflow_dispatch:
  schedule:
    # Weekly on Mondays at 06:00 UTC
    - cron: "0 6 * * 1"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/update-flake-lock@v22
        with:
          pr-title: "chore(deps): update flake.lock"
          pr-labels: dependencies
